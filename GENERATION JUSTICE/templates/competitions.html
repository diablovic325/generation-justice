<section class="section page-intro">
    <span class="eyebrow" data-i18n="comp.eyebrow">Essay Competitions</span>
    <h1 data-i18n="comp.title">Monthly winners and new essay entries.</h1>
    <p class="lead" data-i18n="comp.lead">Announce the winners of each month's best essay competition and collect new entries from members.</p>
</section>

<section class="section no-top split">
    <div class="panel">
        <h2 data-i18n="comp.submit">Submit an essay</h2>
        <form id="essayForm">
            <label data-i18n-label="comp.essayTitle">
                Essay title
                <input id="essayTitle" type="text" required>
            </label>
            <label data-i18n-label="comp.country">
                Country
                <input id="essayCountry" type="text" required>
            </label>
            <label data-i18n-label="comp.summary">
                Essay summary
                <textarea id="essaySummary" data-i18n-placeholder="comp.summaryPh" placeholder="Paste the essay abstract or summary for review." required></textarea>
            </label>
            <button class="button" type="submit" data-i18n="comp.submitBtn">Submit Essay</button>
            <div class="status" id="essayStatus"></div>
        </form>
    </div>
    <div class="panel">
        <h2 data-i18n="comp.yours">Your essay submissions</h2>
        <div id="essaySubmissionList">__USER_ESSAYS__</div>
    </div>
</section>

<section class="section no-top">
    <div class="section-head">
        <span class="eyebrow" data-i18n="comp.winners">Winners</span>
        <h2 data-i18n="comp.winnersTitle">Monthly competition winners.</h2>
    </div>
    <div class="resource-grid">
        __WINNERS__
    </div>
</section>
