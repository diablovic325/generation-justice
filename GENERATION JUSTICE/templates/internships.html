<section class="section page-intro">
    <span class="eyebrow" data-i18n="intern.eyebrow">Internships and Country Projects</span>
    <h1 data-i18n="intern.title">Volunteer for Rule of Law projects in your country.</h1>
    <p class="lead" data-i18n="intern.lead">Members can view active projects by country and register interest in helping local teams.</p>
</section>

<section class="section no-top split">
    <div class="panel">
        <h2 data-i18n="intern.form">Volunteer form</h2>
        <form id="internshipForm">
            <label data-i18n-label="intern.choose">
                Choose a country project
                <select id="internshipProject" required>
                    __PROJECT_OPTIONS__
                </select>
            </label>
            <label data-i18n-label="intern.motivation">
                Motivation
                <textarea id="internshipMotivation" data-i18n-placeholder="intern.motivationPh" placeholder="Explain how you want to help this project." required></textarea>
            </label>
            <button class="button" type="submit" data-i18n="intern.register">Register as Volunteer</button>
            <div class="status" id="internshipStatus"></div>
        </form>
    </div>
    <div class="panel">
        <h2 data-i18n="intern.yours">Your internship applications</h2>
        <div id="internshipSubmissionList">__USER_INTERNSHIPS__</div>
    </div>
</section>

<section class="section no-top">
    <div class="section-head">
        <span class="eyebrow" data-i18n="intern.projects">Projects</span>
        <h2 data-i18n="intern.projectsTitle">Active country projects.</h2>
    </div>
    <div class="resource-grid">
        __PROJECTS__
    </div>
</section>
